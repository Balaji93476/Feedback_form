<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Application</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  nav {
    background: rgba(255,255,255,0.95);
    padding: 1rem 2rem;
    border-radius: 12px;
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  .nav-logo { font-size: 1.5rem; font-weight: 700; color: #667eea; }
  .nav-right { display: flex; gap: 1rem; align-items: center; }
  .nav-link {
    color: #667eea;
    text-decoration: none;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .nav-link:hover { background: rgba(102,126,234,0.1); }
  .btn-logout {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    font-weight: 500;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    padding: 2.5rem;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }

  h1 {
    color: #2c3e50;
    margin-bottom: 0.5rem;
    font-size: 2rem;
  }

  .subtitle {
    color: #7f8c8d;
    margin-bottom: 2rem;
    font-size: 0.95rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
  }

  label .required { color: #e74c3c; }

  input, select, textarea {
    width: 100%;
    padding: 0.75rem;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.3s;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #667eea;
  }

  textarea { resize: vertical; min-height: 100px; }

  .section-title {
    color: #667eea;
    font-size: 1.2rem;
    font-weight: 600;
    margin: 2rem 0 1rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #e0e0e0;
  }

  .btn-submit {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(102,126,234,0.4);
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: #2ecc71;
    color: white;
    padding: 1rem 1.5rem;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transform: translateY(200px);
    transition: transform 0.3s;
    z-index: 1000;
  }

  .toast.show { transform: translateY(0); }
  .toast.error { background: #e74c3c; }

  @media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
    nav { flex-direction: column; gap: 1rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">🏦 Loan Portal</div>
  <div class="nav-right">
    <span style="color: #7f8c8d;">Welcome, <strong>{{ user_name }}</strong></span>
    <a href="/loan/my-applications" class="nav-link">My Applications</a>
    <a href="/form" class="nav-link">Feedback</a>
    <a href="/logout" class="btn-logout">Logout</a>
  </div>
</nav>

<div class="container">
  <h1>Loan Application Form</h1>
  <p class="subtitle">Complete the form below to apply for a loan. All fields marked with <span style="color: #e74c3c;">*</span> are required.</p>

  <form id="loanForm">
    <div class="section-title">Personal Information</div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Full Name <span class="required">*</span></label>
        <input type="text" name="applicant_name" required>
      </div>
      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" name="email" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Phone Number <span class="required">*</span></label>
        <input type="tel" name="phone" required>
      </div>
      <div class="form-group">
        <label>Loan Amount <span class="required">*</span></label>
        <input type="number" name="loan_amount" step="0.01" min="1000" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Loan Type <span class="required">*</span></label>
        <select name="loan_type" required>
          <option value="">Select loan type...</option>
          <option value="Personal">Personal Loan</option>
          <option value="Home">Home Loan</option>
          <option value="Auto">Auto Loan</option>
          <option value="Business">Business Loan</option>
          <option value="Education">Education Loan</option>
        </select>
      </div>
      <div class="form-group">
        <label>Loan Purpose <span class="required">*</span></label>
        <input type="text" name="purpose" required>
      </div>
    </div>

    <div class="section-title">Employment & Income</div>

    <div class="form-row">
      <div class="form-group">
        <label>Employment Status <span class="required">*</span></label>
        <select name="employment_status" required>
          <option value="">Select status...</option>
          <option value="Employed">Employed</option>
          <option value="Self-Employed">Self-Employed</option>
          <option value="Unemployed">Unemployed</option>
          <option value="Retired">Retired</option>
        </select>
      </div>
      <div class="form-group">
        <label>Employer Name</label>
        <input type="text" name="employer_name">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Monthly Income <span class="required">*</span></label>
        <input type="number" name="monthly_income" step="0.01" min="0" required>
      </div>
      <div class="form-group">
        <label>Credit Score (if known)</label>
        <input type="number" name="credit_score" min="300" max="850">
      </div>
    </div>

    <div class="section-title">Collateral Information (Optional)</div>

    <div class="form-row">
      <div class="form-group">
        <label>Collateral Type</label>
        <select name="collateral_type">
          <option value="">No collateral</option>
          <option value="Property">Property</option>
          <option value="Vehicle">Vehicle</option>
          <option value="Securities">Securities</option>
          <option value="Other">Other Assets</option>
        </select>
      </div>
      <div class="form-group">
        <label>Collateral Value</label>
        <input type="number" name="collateral_value" step="0.01" min="0">
      </div>
    </div>

    <div class="form-group">
      <label>Supporting Documents</label>
      <textarea name="documents" placeholder="List of documents submitted (e.g., ID proof, income statements, property papers)"></textarea>
    </div>

    <button type="submit" class="btn-submit">Submit Application</button>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
  const form = document.getElementById('loanForm');
  const toast = document.getElementById('toast');

  function showToast(msg, type = 'success') {
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(form);
    const data = Object.fromEntries(formData);

    try {
      const res = await fetch('/api/loan/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      
      const result = await res.json();
      
      if (result.success) {
        showToast('✓ Loan application submitted successfully!', 'success');
        setTimeout(() => window.location.href = '/loan/my-applications', 2000);
      } else {
        showToast(result.message || 'Failed to submit application', 'error');
      }
    } catch (error) {
      console.error('Submit error:', error);
      showToast('Something went wrong. Please try again.', 'error');
    }
  });
</script>

</body>
</html>
